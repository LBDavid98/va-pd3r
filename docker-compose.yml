services:
  pd3r:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PD3R_DATABASE_URL=sqlite:///./output/.sessions/checkpoints.db
      - PD3R_VECTOR_STORE_PATH=./knowledge/vector_store
      - PD3R_CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    volumes:
      - ./output:/app/output
      - ./knowledge/vector_store:/app/knowledge/vector_store
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - pd3r
    restart: unless-stopped

